<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인시스그룹 AI혁신 R&D센터 설립 진행 간트차트 v3.3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f9;color:#1e2740;font-size:13px;}
:root{
  --navy:#1a2035;
  --blue:#2E75B6; --lblue:#D6E4F0;
  --white:#fff; --gray:#f5f5f5;
  --dgray:#2a2a2a; --mgray:#505050;
  --border:#cccccc; --border2:#e0e0e0;
  --rh:24px;
  --lw:520px; /* 초기 라벨 폭 — resize로 조정 가능 */
  --dw:30px;
  /* STEP 밝은 배경 + 짙은 글자 */
  --s0c:#7F3F00; --s0bg:#FFF0D0; --s0b:linear-gradient(90deg,#e8921a,#f0ad30);
  --s1c:#1F4E79; --s1bg:#D6E8F8; --s1b:linear-gradient(90deg,#2563eb,#4a86f5);
  --s2c:#1E5C36; --s2bg:#D4EFE2; --s2b:linear-gradient(90deg,#1a9463,#28c07a);
  --s3c:#7A2C00; --s3bg:#FFE8D4; --s3b:linear-gradient(90deg,#e05a14,#f07838);
  --s4c:#1A3A5C; --s4bg:#D4E8F8; --s4b:linear-gradient(90deg,#1d61c8,#4a86f5);
  --s5c:#1F4E79; --s5bg:#D6E8F8; --s5b:linear-gradient(90deg,#2563eb,#4a86f5);
  --s6c:#7A2C00; --s6bg:#FFE8D4; --s6b:linear-gradient(90deg,#e05a14,#f07838);
  --s7c:#1E5C36; --s7bg:#D4EFE2; --s7b:linear-gradient(90deg,#1a9463,#28c07a);
  --s8c:#8B0000; --s8bg:#FFD4D4; --s8b:linear-gradient(90deg,#c00000,#e05050);
}

/* ── 툴바 ── */
.toolbar{
  background:var(--navy);color:#e8ecf5;padding:0 14px;
  display:flex;align-items:center;gap:6px;height:44px;
  position:sticky;top:0;z-index:300;border-bottom:2px solid #0d1525;
}
.tb-title{font-size:14px;font-weight:800;color:#fff;white-space:nowrap;margin-right:6px;}
.tb-ver{font-size:10px;color:#8899bb;margin-right:8px;}
.tb-sep{width:1px;height:24px;background:#2e3a55;flex-shrink:0;}
.tb-btn{
  background:#2a3550;color:#c8d0e8;border:1px solid #3a4565;border-radius:5px;
  padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;
  font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.tb-btn:hover{background:#3a4870;color:#fff;}
.tb-btn.acc{background:var(--blue);color:#fff;border-color:#2563eb;}
.tb-btn.acc:hover{background:#2563eb;}
#fbStatus{
  display:flex;align-items:center;gap:5px;
  background:#2a3550;border:1px solid #3a4565;border-radius:6px;
  padding:3px 10px;font-size:11px;font-weight:700;
  color:#8899cc;white-space:nowrap;
}

/* ── 진행률 ── */
.prog-wrap{background:#fff;border-bottom:1px solid var(--border2);
  padding:4px 14px;display:flex;align-items:center;gap:10px;}
.prog-bar{flex:1;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#2563eb,#28c07a);
  border-radius:3px;transition:width .5s;}
.prog-txt{font-size:11px;color:var(--mgray);white-space:nowrap;}

/* ── 범례 ── */
.legend{background:#fff;border-bottom:1px solid var(--border2);
  padding:5px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--dgray);font-weight:600;}
.leg-bar{width:22px;height:10px;border-radius:3px;}
.leg-sep{width:1px;height:14px;background:#ddd;flex-shrink:0;}

/* ── 메인 ── */
.main{display:flex;overflow:hidden;position:relative;}

/* ── 좌측 라벨 패널 ── */
.lp{
  width:var(--lw);min-width:200px;flex-shrink:0;
  position:sticky;left:0;z-index:100;
  border-right:3px solid var(--border);background:#fff;
  overflow:hidden;
  user-select:none;
}
.lp-head{
  background:#D6E4F0;height:44px;
  display:flex;align-items:center;padding:0 8px;gap:4px;
  border-bottom:2px solid #A0B8CC;
}
.lh-num{width:28px;text-align:center;font-size:12px;color:#1F3864;font-weight:800;flex-shrink:0;}
.lh-name{flex:1;font-size:12px;color:#1F3864;font-weight:800;min-width:0;}
.lh-s{width:96px;text-align:center;font-size:12px;color:#1F3864;font-weight:800;flex-shrink:0;}
.lh-e{width:96px;text-align:center;font-size:12px;color:#1F3864;font-weight:800;flex-shrink:0;}
.lh-st{width:66px;text-align:center;font-size:12px;color:#1F3864;font-weight:800;flex-shrink:0;}

/* ── 라벨 행 ── */
.lr{
  display:flex;align-items:center;height:var(--rh);
  padding:0 4px;gap:3px;border-bottom:1px solid var(--border2);
  background:#fff;transition:background .1s;cursor:default;
}
.lr:hover:not(.lr-shdr){background:#f0f6ff;}
.lr-shdr{
  background:#EEF2F8;height:var(--rh);
  border-bottom:1px solid #B8C8D8;
}
.lr-num{width:28px;text-align:center;font-size:11px;color:#505050;font-weight:700;flex-shrink:0;}
.lr-name{
  flex:1;font-size:11px;color:#1e2740;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;min-width:0;
}
.lr-name:hover{color:var(--blue);text-decoration:underline;}
.lr-badge{
  font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;
  white-space:nowrap;flex-shrink:0;max-width:64px;
  overflow:hidden;text-overflow:ellipsis;text-align:center;
}
/* 날짜 */
.lr-date{
  width:94px;font-size:11px;color:#1e2740;font-weight:500;
  border:1px solid #ddd;border-radius:3px;padding:1px 2px;
  text-align:center;background:#F8FAFD;font-family:inherit;
  cursor:pointer;flex-shrink:0;transition:all .15s;
  padding:0 2px;
}
.lr-date:hover{border-color:var(--blue);background:#e8f0ff;}
.lr-date:focus{border-color:var(--blue);background:#fff;outline:none;
  box-shadow:0 0 0 2px rgba(46,117,182,.25);}
/* 상태 */
.lr-sel{
  width:64px;height:20px;font-size:11px;font-weight:700;
  border-radius:4px;border:1px solid #ccd;cursor:pointer;
  font-family:inherit;padding:0 2px;flex-shrink:0;
}
.lr-sel.todo{background:#BDD7EE;color:#1F4E79;}
.lr-sel.inprogress{background:#FFEB9C;color:#7D6608;}
.lr-sel.done{background:#C6EFCE;color:#375623;}

/* ── 리사이즈 핸들 ── */
.resize-handle{
  position:absolute;right:-4px;top:0;bottom:0;
  width:8px;cursor:col-resize;z-index:200;
  display:flex;align-items:center;justify-content:center;
}
.resize-handle::after{
  content:'';width:3px;height:40px;
  background:#2E75B6;border-radius:2px;opacity:.5;
}
.resize-handle:hover::after{opacity:1;}

/* ── 우측 차트 패널 ── */
.cp{flex:1;overflow:auto;position:relative;}
.ci{position:relative;min-width:max-content;}

/* ── 날짜 헤더 ── */
.dh{
  position:sticky;top:0;z-index:50;
  background:#EEF2F8;border-bottom:2px solid #A0B8CC;
}
.month-row{display:flex;height:20px;}
.month-cell{
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#1F3864;
  border-right:1px solid #B8C8D8;border-bottom:1px solid #B8C8D8;
  background:#D6E4F0;white-space:nowrap;flex-shrink:0;
}
.day-row{display:flex;height:24px;}
.day-cell{
  width:var(--dw);min-width:var(--dw);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#2E4A6A;
  border-right:1px solid #C8D8E8;background:#EEF2F8;
}
.day-cell.wk{color:#C00000;background:#FFE0E0;}
.day-cell.hol{color:#C00000;background:#FFCCCC;font-weight:900;}
.day-cell.tod{color:#1F3864!important;background:#FFE500!important;
  font-weight:900;font-size:13px;box-shadow:inset 0 0 0 2px #2E75B6;}

/* ── 차트 바디 ── */
.cb{position:relative;}
.cr{display:flex;border-bottom:1px solid var(--border2);}
.cr:hover:not(.cr-shdr){background:#f4f8ff;}
.cr-shdr{background:#F2F6FA;border-bottom:1px solid #C8D8E8;}
.dc{
  width:var(--dw);min-width:var(--dw);flex-shrink:0;
  height:var(--rh);border-right:1px solid #E8EDF5;
}
.dc.wk{background:#FFF0EE;}
.dc.hol{background:#FFE4E4;}
.dc.tod{background:#EEF4FF;}
.dc.me{border-right:2px solid #A0B8CC!important;}

/* ── 간트 바 ── */
.bl{position:absolute;top:0;left:0;pointer-events:none;}
.bl *{pointer-events:auto;}
.gb{
  position:absolute;height:14px;
  border-radius:4px;cursor:grab;z-index:10;
  display:flex;align-items:center;padding:0 8px;
  font-size:11px;font-weight:700;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
  transition:filter .1s,box-shadow .1s;user-select:none;
}
.gb:hover{filter:brightness(1.1);box-shadow:0 2px 8px rgba(0,0,0,.28);z-index:20;}
.gb.dragging{cursor:grabbing;opacity:.85;z-index:50;}
.gb .rhl,.gb .rhr{position:absolute;top:0;bottom:0;width:7px;cursor:ew-resize;z-index:15;}
.gb .rhl{left:0;border-radius:4px 0 0 4px;}
.gb .rhr{right:0;border-radius:0 4px 4px 0;}

/* ── TODAY 선 ── */
.tl{
  position:absolute;width:2px;background:var(--blue);
  pointer-events:none;z-index:35;opacity:.9;
}
.tl::before{
  content:'TODAY';position:absolute;top:0;left:50%;
  transform:translateX(-50%);background:var(--blue);color:#fff;
  font-size:9px;font-weight:800;padding:1px 5px;
  border-radius:0 0 4px 4px;white-space:nowrap;
}

/* ── 드래그 팁 ── */
.drag-tip{
  position:fixed;background:#1e2740;color:#fff;
  font-size:11px;font-weight:700;padding:4px 10px;
  border-radius:6px;pointer-events:none;display:none;
  z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.3);
}

/* ════════════════════════════════════════
   팝업 모달
════════════════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:500;display:none;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex;}
.modal{
  background:#fff;border-radius:12px;
  width:520px;max-width:95vw;max-height:90vh;
  overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.3);
  animation:popIn .2s ease;
}
@keyframes popIn{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-head{
  background:#D6E4F0;padding:14px 18px 10px;
  border-radius:12px 12px 0 0;border-bottom:1px solid #A0B8CC;
  display:flex;align-items:center;gap:8px;
}
.modal-step{font-size:11px;font-weight:800;padding:2px 8px;border-radius:4px;}
.modal-title{flex:1;font-size:14px;font-weight:800;color:#1F3864;}
.modal-close{
  background:none;border:none;cursor:pointer;
  font-size:20px;color:#506080;line-height:1;padding:2px 6px;
}
.modal-close:hover{color:#C00000;}
.modal-body{padding:16px 18px;}
.mf{margin-bottom:12px;}
.mf label{
  display:block;font-size:11px;font-weight:700;
  color:#506080;margin-bottom:4px;
}
.mf input[type=text],.mf input[type=date],.mf select,.mf textarea{
  width:100%;font-size:13px;font-family:inherit;color:#1e2740;
  border:1px solid #C8D8E8;border-radius:5px;
  padding:6px 10px;background:#F8FAFD;
  transition:border-color .15s;
}
.mf input:focus,.mf select:focus,.mf textarea:focus{
  outline:none;border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(46,117,182,.15);
  background:#fff;
}
.mf textarea{resize:vertical;min-height:60px;line-height:1.5;}
.mf-row{display:flex;gap:10px;}
.mf-row .mf{flex:1;}
.modal-foot{
  padding:12px 18px;border-top:1px solid var(--border2);
  display:flex;gap:8px;justify-content:flex-end;
}
.m-btn{
  padding:7px 18px;font-size:12px;font-weight:700;
  border-radius:6px;cursor:pointer;font-family:inherit;
  border:1px solid transparent;transition:all .15s;
}
.m-btn.save{background:var(--blue);color:#fff;border-color:#2563eb;}
.m-btn.save:hover{background:#2563eb;}
.m-btn.cancel{background:#f0f4f8;color:#506080;border-color:#C8D8E8;}
.m-btn.cancel:hover{background:#e0e8f0;}

/* 툴팁 */
.gtt{
  position:fixed;background:#1e2740;color:#e8ecf5;
  font-size:11px;padding:8px 12px;border-radius:8px;
  pointer-events:none;display:none;z-index:998;
  max-width:260px;box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.gtt-t{font-weight:800;margin-bottom:4px;color:#fff;font-size:12px;}
.gtt-r{display:flex;justify-content:space-between;gap:12px;
  margin-top:2px;font-size:11px;color:#9ab0cc;}
.gtt-v{color:#e2e8f0;font-weight:600;text-align:right;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1e2740;color:#fff;padding:8px 20px;border-radius:20px;
  font-size:12px;font-weight:700;opacity:0;transition:opacity .3s;
  pointer-events:none;z-index:9999;
}
</style>
</head>
<body>

<!-- 툴바 -->
<div class="toolbar">
  <span class="tb-title">🔬 인시스그룹 AI혁신 R&D센터  설립 진행 간트차트</span>
  <span class="tb-ver">v3.3</span>
  <div class="tb-sep"></div>
  <button class="tb-btn acc" onclick="scrollToToday()">📅 오늘로</button>
  <button class="tb-btn" onclick="saveData()">💾 저장</button>
  <button class="tb-btn" onclick="loadData()">📂 불러오기</button>
  <button class="tb-btn" onclick="resetAll()">↺ 초기화</button>
  <div class="tb-sep"></div>
  <span style="font-size:11px;color:#8899cc;" id="todayTxt"></span>
  <div class="tb-sep"></div>
  <span class="tb-prog" id="progTxt" style="font-size:11px;color:#70c090;font-weight:700;"></span>
  <div class="tb-sep"></div>
  <div id="fbStatus">
    <span id="fbDot">🔴</span>
    <span id="fbTxt">Firebase 연결 중...</span>
    <span id="fbTime" style="font-size:10px;color:#667788;margin-left:2px;"></span>
  </div>
</div>

<!-- 진행률 -->
<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <span class="prog-txt" id="progDetail"></span>
</div>

<!-- 범례 -->
<div class="legend">
  <span style="font-size:11px;font-weight:700;color:#1F3864;">범례:</span>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#e8921a,#f0ad30)"></div>STEP 0</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#2563eb,#4a86f5)"></div>STEP 1·4·5</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#1a9463,#28c07a)"></div>STEP 2·7</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#e05a14,#f07838)"></div>STEP 3·6</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#c00000,#e05050)"></div>STEP 8</div>
  <div class="leg-sep"></div>
  <div class="leg"><div class="leg-bar" style="background:#FFE4E4;border:1px solid #ffbbbb;"></div>공휴일·투표일</div>
  <div class="leg"><div class="leg-bar" style="background:#FFF0EE;border:1px solid #f8cfc5;"></div>주말</div>
  <div class="leg"><div class="leg-bar" style="background:#EEF4FF;border:1px solid #c8d8f8;"></div>오늘</div>
  <div class="leg-sep"></div>
  <span style="font-size:11px;color:#666;">
    💡 항목명 클릭 → 상세팝업·수정 &nbsp;|&nbsp;
    막대 드래그 → 날짜 이동 &nbsp;|&nbsp;
    ↔ 라벨열 경계선 드래그 → 너비 조정
  </span>
</div>

<!-- 메인 -->
<div class="main" id="main">

  <!-- 좌측 라벨 패널 -->
  <div class="lp" id="lp">
    <div class="lp-head">
      <div class="lh-num">#</div>
      <div class="lh-name">추진 항목 <span style="font-size:10px;font-weight:400;color:#506080;">(클릭→상세/수정)</span></div>
      <div class="lh-s">시작일</div>
      <div class="lh-e">완료일</div>
      <div class="lh-st">상태</div>
    </div>
    <div id="lbody"></div>
    <!-- 리사이즈 핸들 -->
    <div class="resize-handle" id="resizeHandle"></div>
  </div>

  <!-- 우측 차트 -->
  <div class="cp" id="cp">
    <div class="ci" id="ci">
      <div class="dh" id="dh">
        <div class="month-row" id="mrow"></div>
        <div class="day-row" id="drow"></div>
      </div>
      <div class="cb" id="cb">
        <div class="bl" id="bl"></div>
      </div>
    </div>
    <div class="tl" id="tl" style="display:none;"></div>
  </div>
</div>

<!-- ── 상세/수정 팝업 모달 ── -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <span class="modal-step" id="mStep"></span>
      <span class="modal-title" id="mTitle">항목 상세 / 수정</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mTid">
      <div class="mf">
        <label>항목명</label>
        <input type="text" id="mName" placeholder="항목명">
      </div>
      <div class="mf-row">
        <div class="mf">
          <label>시작일</label>
          <input type="date" id="mS">
        </div>
        <div class="mf">
          <label>완료일</label>
          <input type="date" id="mE">
        </div>
      </div>
      <div class="mf-row">
        <div class="mf">
          <label>상태</label>
          <select id="mSt">
            <option value="todo">시작전</option>
            <option value="inprogress">진행중</option>
            <option value="done">완료</option>
          </select>
        </div>
        <div class="mf">
          <label>담당자</label>
          <input type="text" id="mPic">
        </div>
      </div>
      <div class="mf">
        <label>비고 / 상세 내용</label>
        <textarea id="mNote" rows="4"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="m-btn cancel" onclick="closeModalDirect()">취소</button>
      <button class="m-btn save" onclick="saveModal()">💾 저장</button>
    </div>
  </div>
</div>

<div class="drag-tip" id="dragTip"></div>
<div class="gtt" id="gtt"></div>
<div class="toast" id="toast"></div>

  {id:'t81',st:'s8',name:'② 서류 전형·면접 진행',s:'2026-07-06',e:'2026-07-17',pic:'경영지원실',status:'todo',note:''},
  {id:'t82',st:'s8',name:'③ 최종 합격·입사·4대보험·인사발령',s:'2026-07-20',e:'2026-07-22',pic:'경영지원실',status:'todo',note:'인시스 직접 고용. 연구소 내부 인사발령 별도 처리 (발령일 ≠ 입사일)'},
  {id:'t83',st:'s8',name:'④ KOITA 변경 신고 (채용 후 30일)',s:'2026-07-23',e:'2026-07-24',pic:'센터장',status:'todo',note:'rnd.or.kr → 변경신고 → [제출하기] 클릭 필수. 저장만으로는 미접수'},
];

let TASKS=INIT.map(t=>({...t}));
const CAL_S='2026-05-20', CAL_E='2026-08-01';
let COLS=[];

function buildCols(){
  COLS=[];
  let cur=fromDS(CAL_S);
  const end=fromDS(CAL_E);
  while(cur<=end){
    const s=toDS(cur), hol=isHol(s), wk=isWk(s), td=(s===TODAY);
    const me=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate()===cur.getDate();
    COLS.push({s,day:cur.getDate(),m:cur.getMonth()+1,y:cur.getFullYear(),hol,wk,td,me});
    cur.setDate(cur.getDate()+1);
  }
}
function colOf(s){
  if(!s) return 0;
  const i=COLS.findIndex(c=>c.s===s);
  return i>=0?i:0;
}

// ── 렌더 ──
function render(){
  buildCols();
  renderHead();
  renderRows();
  renderBars();
  setTodayLine();
  updateProgress();
}

function renderHead(){
  const mr=document.getElementById('mrow'), dr=document.getElementById('drow');
  mr.innerHTML=''; dr.innerHTML='';
  const totalW=COLS.length*DW;
  // 월 그룹
  const months=[];let cur=null;
  COLS.forEach(c=>{
    const k=`${c.y}-${c.m}`;
    if(!cur||cur.k!==k){cur={k,m:c.m,y:c.y,cnt:0};months.push(cur);}
    cur.cnt++;
  });
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  months.forEach(m=>{
    const el=document.createElement('div');
    el.className='month-cell';
    el.style.width=(m.cnt*DW)+'px'; el.style.minWidth=(m.cnt*DW)+'px';
    el.textContent=`${m.y}년 ${MN[m.m-1]}`;
    mr.appendChild(el);
  });
  // 일
  COLS.forEach(c=>{
    const el=document.createElement('div');
    el.className='day-cell'+(c.hol?' hol':c.wk?' wk':'')+(c.td?' tod':'');
    el.style.width=DW+'px'; el.style.minWidth=DW+'px';
    el.textContent=c.day;
    dr.appendChild(el);
  });
}

function renderRows(){
  const lb=document.getElementById('lbody');
  const cb=document.getElementById('cb');
  const bl=document.getElementById('bl');
  lb.innerHTML='';
  Array.from(cb.children).forEach(el=>{ if(el.id!=='bl') cb.removeChild(el); });
  bl.innerHTML='';
  const totalW=COLS.length*DW;
  const stMap={'todo':'todo','inprogress':'inprogress','done':'done','시작전':'todo','진행중':'inprogress','완료':'done'};

  STEPS.forEach(step=>{
    const tasks=TASKS.filter(t=>t.st===step.id);
    if(!tasks.length) return;

    // STEP 헤더 — 라벨
    const lh=document.createElement('div');
    lh.className='lr lr-shdr';
    lh.style.background=step.bg;
    lh.innerHTML=`
      <div class="lr-num"></div>
      <div style="flex:1;font-size:12px;font-weight:800;color:${step.col};
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
        ${step.lbl}
      </div>`;
    lb.appendChild(lh);

    // STEP 헤더 — 차트
    const ch=document.createElement('div');
    ch.className='cr cr-shdr';
    ch.style.cssText=`width:${totalW}px;height:24px;display:flex;background:${step.bg};opacity:.7;`;
    COLS.forEach(c=>{
      const el=document.createElement('div');
      el.className='dc'+(c.hol?' hol':c.wk?' wk':'')+(c.td?' tod':'')+(c.me?' me':'');
      ch.appendChild(el);
    });
    cb.insertBefore(ch,bl);

    // 태스크 행
    let rowNum=0;
    TASKS.filter(t=>t.st===step.id).forEach(task=>{
      rowNum++;
      const stKey=stMap[task.status]||'todo';
      // 라벨
      const lr=document.createElement('div');
      lr.className='lr'; lr.dataset.tid=task.id;
      lr.innerHTML=`
        <div class="lr-num">${TASKS.filter(t=>t.st===step.id).indexOf(task)+1+
          STEPS.slice(0,STEPS.indexOf(step)).reduce((a,s)=>a+TASKS.filter(t=>t.st===s.id).length,0)}</div>
        <div class="lr-name" data-tid="${task.id}" title="클릭하여 상세 보기·수정">
          ${task.name}
        </div>
        <input type="date" class="lr-date" data-tid="${task.id}" data-side="s" value="${task.s}">
        <input type="date" class="lr-date" data-tid="${task.id}" data-side="e" value="${task.e}">
        <select class="lr-sel ${stKey}" data-tid="${task.id}">
          <option value="todo" ${stKey==='todo'?'selected':''}>시작전</option>
          <option value="inprogress" ${stKey==='inprogress'?'selected':''}>진행중</option>
          <option value="done" ${stKey==='done'?'selected':''}>완료</option>
        </select>`;
      lb.appendChild(lr);

      // 차트 배경
      const cr=document.createElement('div');
      cr.className='cr'; cr.style.cssText=`width:${totalW}px;height:24px;display:flex;`;
      cr.dataset.tid=task.id;
      COLS.forEach(c=>{
        const el=document.createElement('div');
        el.className='dc'+(c.hol?' hol':c.wk?' wk':'')+(c.td?' tod':'')+(c.me?' me':'');
        cr.appendChild(el);
      });
      cb.insertBefore(cr,bl);
    });
  });

  // 행 번호 재계산
  let n=0;
  lb.querySelectorAll('.lr:not(.lr-shdr) .lr-num').forEach(el=>{ el.textContent=++n; });
}

function renderBars(){
  const bl=document.getElementById('bl');
  bl.innerHTML='';
  const totalW=COLS.length*DW;
  bl.style.width=totalW+'px';
  let top=0;
  STEPS.forEach(step=>{
    const tasks=TASKS.filter(t=>t.st===step.id);
    if(!tasks.length) return;
    top+=RH; // step 헤더
    tasks.forEach(task=>{
      const sc=colOf(task.s), ec=colOf(task.e);
      const bw=(ec-sc+1)*DW-3;
      if(bw>0){
        const bar=document.createElement('div');
        bar.className='gb'; bar.dataset.tid=task.id;
        bar.style.cssText=`left:${sc*DW}px;width:${bw}px;top:${top+3}px;background:${step.bar};`;
        const short=task.name.replace(/^[①-⑨]\s*/,'');
        if(bw>50) bar.textContent=short.length>20?short.substring(0,20)+'…':short;
        const rl=document.createElement('div');rl.className='rhl';rl.dataset.tid=task.id;rl.dataset.side='l';
        const rr=document.createElement('div');rr.className='rhr';rr.dataset.tid=task.id;rr.dataset.side='r';
        bar.appendChild(rl); bar.appendChild(rr);
        bl.appendChild(bar);
      }
      top+=RH;
    });
  });
  bl.style.height=top+'px';
}

function setTodayLine(){
  const tl=document.getElementById('tl');
  const cb=document.getElementById('cb');
  if(!tl||!cb) return;
  const idx=colOf(TODAY);
  if(idx<0){tl.style.display='none';return;}
  const dhH=document.getElementById('dh').offsetHeight||52;
  tl.style.cssText=`
    display:block;position:absolute;
    left:${idx*DW+DW/2-1}px;top:${dhH}px;
    width:2px;height:${cb.offsetHeight}px;
    background:var(--blue);opacity:.9;pointer-events:none;z-index:35;`;
}

function updateProgress(){
  const total=TASKS.length;
  const sm={'todo':'todo','inprogress':'inprogress','done':'done','시작전':'todo','진행중':'inprogress','완료':'done'};
  const done=TASKS.filter(t=>sm[t.status]==='done').length;
  const prog=TASKS.filter(t=>sm[t.status]==='inprogress').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progDetail').textContent=
    `완료 ${done}건 / 진행중 ${prog}건 / 시작전 ${total-done-prog}건 (전체 ${total}건)`;
  document.getElementById('progTxt').textContent=`완료 ${pct}%`;
  const now=new Date();
  document.getElementById('todayTxt').textContent=
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}

// ── 이벤트: 날짜·상태 변경 ──
document.getElementById('lbody').addEventListener('change',function(e){
  const el=e.target;
  if(el.classList.contains('lr-date')){
    const tid=el.dataset.tid, side=el.dataset.side;
    const task=TASKS.find(t=>t.id===tid); if(!task) return;
    if(side==='s'){
      task.s=el.value;
      if(task.s>task.e){ task.e=task.s; const ei=document.querySelector(`.lr-date[data-tid="${tid}"][data-side="e"]`); if(ei) ei.value=task.e; }
    } else {
      task.e=el.value;
      if(task.e<task.s){ task.s=task.e; const si=document.querySelector(`.lr-date[data-tid="${tid}"][data-side="s"]`); if(si) si.value=task.s; }
    }
    updateSingleBar(tid); saveData(true); showToast('📅 날짜 변경 저장');
    return;
  }
  if(el.classList.contains('lr-sel')){
    const tid=el.dataset.tid; const task=TASKS.find(t=>t.id===tid); if(!task) return;
    task.status=el.value; el.className='lr-sel '+el.value;
    updateProgress(); saveData(true); showToast('✅ 상태 변경 저장');
  }
});

function openModal(tid){
  const task=TASKS.find(t=>t.id===tid); if(!task) return;
  const step=STEPS.find(s=>s.id===task.st);
  document.getElementById('mTid').value=tid;
  document.getElementById('mStep').textContent=step.lbl.split(' ')[0]+' '+step.lbl.split(' ')[1];
  document.getElementById('mStep').style.cssText=`background:${step.bg};color:${step.col};`;
  document.getElementById('mTitle').textContent=task.name;
  document.getElementById('mName').value=task.name;
  document.getElementById('mS').value=task.s;
  document.getElementById('mE').value=task.e;
  const sm={'todo':'todo','inprogress':'inprogress','done':'done','시작전':'todo','진행중':'inprogress','완료':'done'};
  document.getElementById('mSt').value=sm[task.status]||'todo';
  document.getElementById('mPic').value=task.pic||'';
  document.getElementById('mNote').value=task.note||'';
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(e){ if(e.target===document.getElementById('modalBg')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modalBg').classList.remove('open'); }
function saveModal(){
  const tid=document.getElementById('mTid').value;
  const task=TASKS.find(t=>t.id===tid); if(!task) return;
  task.name=document.getElementById('mName').value;
  task.s=document.getElementById('mS').value;
  task.e=document.getElementById('mE').value;
  task.status=document.getElementById('mSt').value;
  task.pic=document.getElementById('mPic').value;
  task.note=document.getElementById('mNote').value;
  closeModalDirect();
  render();
  saveData(true);
  showToast('✅ 항목 수정 저장 완료');
}

// ── 단일 바 업데이트 ──
function updateSingleBar(tid){
  const task=TASKS.find(t=>t.id===tid); if(!task) return;
  const step=STEPS.find(s=>s.id===task.st);
  const sc=colOf(task.s), ec=colOf(task.e), bw=(ec-sc+1)*DW-3;
  let bar=document.querySelector(`.gb[data-tid="${tid}"]`);
  if(!bar){
    bar=document.createElement('div'); bar.className='gb'; bar.dataset.tid=tid;
    const rl=document.createElement('div');rl.className='rhl';rl.dataset.tid=tid;rl.dataset.side='l';
    const rr=document.createElement('div');rr.className='rhr';rr.dataset.tid=tid;rr.dataset.side='r';
    bar.appendChild(rl); bar.appendChild(rr);
    document.getElementById('bl').appendChild(bar);
  }
  if(bw<=0){bar.style.display='none';return;}
  bar.style.display='';
  bar.style.left=sc*DW+'px'; bar.style.width=bw+'px'; bar.style.background=step.bar;
  // top 재계산
  let top=0;
  for(const s of STEPS){
    const tasks=TASKS.filter(t=>t.st===s.id); if(!tasks.length) continue;
    top+=RH;
    for(const t of tasks){ if(t.id===tid){bar.style.top=top+6+'px';break;} top+=RH; }
    if(bar.style.top) break;
  }
  const short=task.name.replace(/^[①-⑨]\s*/,'');
  Array.from(bar.childNodes).filter(n=>n.nodeType===3).forEach(n=>bar.removeChild(n));
  if(bw>50) bar.insertBefore(document.createTextNode(short.length>20?short.substring(0,20)+'…':short), bar.firstChild);
}

// ── 드래그&리사이즈 ──
(function(){
  const tip=document.getElementById('dragTip');
  const gtt=document.getElementById('gtt');

  document.getElementById('bl').addEventListener('mousedown',function(e){
    const bar=e.target.closest('.gb');
    const handle=e.target.closest('.rhl,.rhr');
    if(!bar&&!handle) return;
    e.preventDefault(); e.stopPropagation();
    gtt.style.display='none';
    const tid=(handle||bar).dataset.tid;
    const task=TASKS.find(t=>t.id===tid); if(!task) return;
    const origS=task.s, origE=task.e;
    const startX=e.clientX;
    const side=handle?handle.dataset.side:null;
    const mode=side?'r-'+side:'move';
    bar.classList.add('dragging');
    document.body.style.cursor=mode==='move'?'grabbing':'ew-resize';
    document.body.style.userSelect='none';
    tip.style.display='block';

    function onMove(ev){
      const dd=Math.round((ev.clientX-startX)/DW);
      const el=document.querySelector(`.gb[data-tid="${tid}"]`);
      if(mode==='move'){
        const dur=dayDiff(origS,origE);
        task.s=addDays(origS,dd); task.e=addDays(task.s,dur);
        if(el) el.style.left=(colOf(task.s)*DW)+'px';
        tip.textContent=`${task.s} ~ ${task.e}`;
      } else if(mode==='r-r'){
        const ne=addDays(origE,dd);
        if(ne>=task.s){ task.e=ne; if(el) el.style.width=((colOf(task.e)-colOf(task.s)+1)*DW-3)+'px'; }
        tip.textContent=`완료: ${task.e}`;
      } else {
        const ns=addDays(origS,dd);
        if(ns<=task.e){ task.s=ns; if(el){ el.style.left=(colOf(task.s)*DW)+'px'; el.style.width=((colOf(task.e)-colOf(task.s)+1)*DW-3)+'px'; } }
        tip.textContent=`시작: ${task.s}`;
      }
      tip.style.left=(ev.clientX+14)+'px'; tip.style.top=(ev.clientY-34)+'px';
    }
    function onUp(){
      bar.classList.remove('dragging');
      document.body.style.cursor=''; document.body.style.userSelect='';
      tip.style.display='none';
      // 날짜 인풋 동기화
      const si=document.querySelector(`.lr-date[data-tid="${tid}"][data-side="s"]`);
      const ei=document.querySelector(`.lr-date[data-tid="${tid}"][data-side="e"]`);
      if(si) si.value=task.s; if(ei) ei.value=task.e;
      // 바 텍스트 갱신
      const el=document.querySelector(`.gb[data-tid="${tid}"]`);
      if(el){
        const short=task.name.replace(/^[①-⑨]\s*/,'');
        Array.from(el.childNodes).filter(n=>n.nodeType===3).forEach(n=>el.removeChild(n));
        const w=parseInt(el.style.width)||0;
        if(w>50) el.insertBefore(document.createTextNode(short.length>20?short.substring(0,20)+'…':short),el.firstChild);
      }
      updateProgress(); saveData(true); showToast('📅 날짜 변경 저장');
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });

  // 툴팁
  document.getElementById('bl').addEventListener('mouseover',function(e){
    const bar=e.target.closest('.gb'); if(!bar) return;
    const task=TASKS.find(t=>t.id===bar.dataset.tid); if(!task) return;
    const step=STEPS.find(s=>s.id===task.st);
    gtt.innerHTML=`<div class="gtt-t">${task.name}</div>
      <div class="gtt-r"><span>시작</span><span class="gtt-v">${task.s}</span></div>
      <div class="gtt-r"><span>완료</span><span class="gtt-v">${task.e}</span></div>
      <div class="gtt-r"><span>담당</span><span class="gtt-v">${task.pic}</span></div>
      ${task.note?`<div class="gtt-r" style="margin-top:5px;"><span>비고</span><span class="gtt-v" style="max-width:170px;white-space:normal;">${task.note.substring(0,80)}${task.note.length>80?'…':''}</span></div>`:''}
      <div style="font-size:10px;color:#667799;margin-top:5px;">← 클릭하면 항목명으로 전체 내용 확인</div>`;
    gtt.style.display='block';
  });
  document.getElementById('bl').addEventListener('mousemove',function(e){
    if(gtt.style.display==='block'){ gtt.style.left=(e.clientX+14)+'px'; gtt.style.top=(e.clientY-8)+'px'; }
  });
  document.getElementById('bl').addEventListener('mouseleave',()=>{ gtt.style.display='none'; });
})();

// ── 라벨 열 리사이즈 ──
(function(){
  const handle=document.getElementById('resizeHandle');
  const lp=document.getElementById('lp');
  let dragging=false, startX=0, startW=0;
  handle.addEventListener('mousedown',function(e){
    dragging=true; startX=e.clientX; startW=lp.offsetWidth;
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!dragging) return;
    const newW=Math.max(200, Math.min(700, startW+(e.clientX-startX)));
    lp.style.width=newW+'px';
    document.documentElement.style.setProperty('--lw',newW+'px');
    setTodayLine();
  });
  document.addEventListener('mouseup',function(){
    if(dragging){ dragging=false; document.body.style.cursor=''; document.body.style.userSelect=''; }
  });
})();

// ── Firebase 상태 ──
function setFbSt(dot,txt,time,color){
  const d=document.getElementById('fbDot'), t=document.getElementById('fbTxt');
  const tm=document.getElementById('fbTime'), box=document.getElementById('fbStatus');
  if(d) d.textContent=dot; if(t) t.textContent=txt;
  if(tm) tm.textContent=time||''; if(box) box.style.color=color||'#8899cc';
}

function connectFirebase(){
  if(!window._fbLoad){ setFbSt('🔴','Firebase 미연결','','#ff6666'); return; }
  setFbSt('🟡','연결 중...','','#ffcc44');
  window._fbLoad(function(data){
    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    if(data){
      applyData(data);
      localStorage.setItem('rnd_g2',JSON.stringify(Array.isArray(data)?data:Object.values(data)));
      render(); setFbSt('🟢','Firebase 연결됨',`(${now} 동기화)`,'#44aa66');
      showToast('☁️ Firebase 데이터 로드 완료',1500);
    } else {
      setFbSt('🟢','Firebase 연결됨','(데이터 없음)','#44aa66');
      showToast('Firebase 데이터 없음 — 초기 데이터 사용',1500);
    }
  });
}

function applyData(arr){
  if(!arr) return;
  const list=Array.isArray(arr)?arr:Object.values(arr);
  list.forEach(item=>{ const t=TASKS.find(x=>x.id===item.id); if(t){ t.s=item.s; t.e=item.e; t.status=item.status||'todo'; if(item.note!==undefined) t.note=item.note; if(item.pic) t.pic=item.pic; if(item.name) t.name=item.name; } });
}

function saveData(silent=false){
  const data=TASKS.map(t=>({id:t.id,s:t.s,e:t.e,status:t.status,note:t.note||'',pic:t.pic||'',name:t.name}));
  localStorage.setItem('rnd_g2',JSON.stringify(data));
  if(window._fbSave){
    window._fbSave(data).then(()=>{
      const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
      setFbSt('🟢','Firebase 저장됨',`(${now})`,'#44aa66');
    });
  } else {
    if(!silent) showToast('💾 로컬 저장 완료');
    setFbSt('🔴','Firebase 미연결','','#ff6666');
  }
}

function loadData(){
  if(window._fbLoad){
    setFbSt('🟡','불러오는 중...','','#ffcc44');
    window._fbLoad(function(data){
      if(data){ applyData(data); render(); showToast('☁️ Firebase 불러오기 완료'); setFbSt('🟢','Firebase 연결됨','','#44aa66'); }
      else { loadFromLocal(); }
    });
  } else { loadFromLocal(); }
}
function loadFromLocal(){
  try{
    const raw=localStorage.getItem('rnd_g2');
    if(!raw){ showToast('저장된 데이터 없음'); return; }
    applyData(JSON.parse(raw)); render(); showToast('📂 로컬 불러오기 완료');
  }catch(ex){ showToast('불러오기 실패: '+ex.message); }
}
function resetAll(){
  if(!confirm('모든 변경사항을 초기화하겠습니까?')) return;
  TASKS=INIT.map(t=>({...t})); localStorage.removeItem('rnd_g2');
  render(); showToast('↺ 초기화 완료');
}

function scrollToToday(){
  const cp=document.getElementById('cp');
  const idx=colOf(TODAY);
  cp.scrollLeft=Math.max(0,idx*DW-cp.offsetWidth/2+DW/2);
}

function showToast(msg,dur=1800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>{ t.style.opacity='0'; },dur);
}

// ── 초기화 ──
window.addEventListener('load',function(){
  try{ const raw=localStorage.getItem('rnd_g2'); if(raw) applyData(JSON.parse(raw)); }catch(e){}
  render();
  setTimeout(()=>{ scrollToToday(); setTodayLine(); },150);
  window.addEventListener('resize',()=>{ setTodayLine(); });
  document.getElementById('cp').addEventListener('scroll',()=>{ setTodayLine(); });
  if(window._fbReady){ connectFirebase(); }
  else { document.addEventListener('firebase-ready',connectFirebase); }
});
</script>
</body>
