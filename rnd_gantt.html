<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인시스그룹 AI혁신 R&D센터 설립 진행 간트차트 v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ── 기본 ── */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f9;color:#1e2740;font-size:12px;}

/* ── CSS 변수 ── */
:root{
  --navy:#1a2035; --blue:#2E75B6; --lblue:#D6E4F0;
  --white:#fff; --gray:#f5f5f5; --dgray:#404040; --mgray:#595959;
  --border:#cccccc; --border2:#e0e0e0;
  /* STEP 색상 */
  --s0c:#7F3F00; --s0b:linear-gradient(90deg,#e8921a,#f0ad30); --s0bg:#fff7ed;
  --s1c:#1F4E79; --s1b:linear-gradient(90deg,#2563eb,#4a86f5); --s1bg:#eff4ff;
  --s2c:#375623; --s2b:linear-gradient(90deg,#1a9463,#28c07a); --s2bg:#edfaf4;
  --s3c:#843C0C; --s3b:linear-gradient(90deg,#e05a14,#f07838); --s3bg:#fff4ed;
  --s4c:#1A3A5C; --s4b:linear-gradient(90deg,#1d61c8,#4a86f5); --s4bg:#eef4ff;
  --s5c:#1F4E79; --s5b:linear-gradient(90deg,#2563eb,#4a86f5); --s5bg:#eff4ff;
  --s6c:#843C0C; --s6b:linear-gradient(90deg,#e05a14,#f07838); --s6bg:#fff4ed;
  --s7c:#375623; --s7b:linear-gradient(90deg,#1a9463,#28c07a); --s7bg:#edfaf4;
  --s8c:#C00000; --s8b:linear-gradient(90deg,#c00000,#e05050); --s8bg:#fff0f0;
  /* 레이아웃 */
  --lw:520px;   /* 라벨 열 너비 */
  --dw:32px;    /* 날짜 열 너비 */
  --rh:28px;    /* 행 높이 */
  --hh1:22px;   /* 월 헤더 높이 */
  --hh2:26px;   /* 일 헤더 높이 */
}

/* ── 툴바 ── */
.toolbar{
  background:var(--navy);color:#e8ecf5;
  padding:0 14px;display:flex;align-items:center;gap:6px;
  height:44px;position:sticky;top:0;z-index:300;
  border-bottom:2px solid #0d1525;flex-wrap:nowrap;
}
.tb-title{font-size:14px;font-weight:800;color:#fff;white-space:nowrap;margin-right:8px;
  text-shadow:0 0 16px rgba(100,150,255,0.5);}
.tb-ver{font-size:10px;color:#8899bb;margin-right:10px;}
.tb-sep{width:1px;height:24px;background:#2e3a55;flex-shrink:0;}
.tb-btn{
  background:#2a3550;color:#c8d0e8;border:1px solid #3a4565;
  border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.tb-btn:hover{background:#3a4870;color:#fff;}
.tb-btn.accent{background:var(--blue);color:#fff;border-color:#2563eb;}
.tb-btn.accent:hover{background:#2563eb;}
.tb-info{font-size:11px;color:#8899cc;white-space:nowrap;}
.tb-prog{font-size:11px;color:#70c090;font-weight:700;white-space:nowrap;}

/* ── 진행률 ── */
.prog-wrap{background:#fff;border-bottom:1px solid var(--border2);padding:4px 14px;display:flex;align-items:center;gap:10px;}
.prog-bar{flex:1;height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#2563eb,#28c07a);border-radius:2px;transition:width .5s;}
.prog-txt{font-size:10px;color:var(--mgray);white-space:nowrap;}

/* ── 범례 ── */
.legend{
  background:#fff;border-bottom:1px solid var(--border2);
  padding:5px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--dgray);font-weight:600;}
.leg-bar{width:24px;height:10px;border-radius:3px;}
.leg-sep{width:1px;height:14px;background:#ddd;flex-shrink:0;}

/* ── 메인 레이아웃 ── */
.gantt-outer{
  display:flex;flex-direction:row;overflow:hidden;
  position:relative;
}

/* ── 좌측 고정 패널 ── */
.label-panel{
  width:var(--lw);min-width:var(--lw);flex-shrink:0;
  overflow:hidden;position:sticky;left:0;z-index:100;
  border-right:2px solid var(--border);
  background:#fff;
}
.lp-head{
  background:var(--navy);height:calc(var(--hh1)+var(--hh2));
  display:flex;align-items:center;padding:0 8px;gap:4px;
  border-bottom:2px solid #3a4565;
}
.lh-num{width:26px;text-align:center;font-size:10px;color:#8899cc;font-weight:700;flex-shrink:0;}
.lh-step{width:70px;font-size:10px;color:#8899cc;font-weight:700;flex-shrink:0;}
.lh-name{flex:1;font-size:11px;color:#c8d0f0;font-weight:700;}
.lh-s{width:52px;text-align:center;font-size:10px;color:#8899cc;font-weight:700;flex-shrink:0;}
.lh-e{width:52px;text-align:center;font-size:10px;color:#8899cc;font-weight:700;flex-shrink:0;}
.lh-st{width:62px;text-align:center;font-size:10px;color:#8899cc;font-weight:700;flex-shrink:0;}
.lh-pic{width:80px;text-align:center;font-size:10px;color:#8899cc;font-weight:700;flex-shrink:0;}

/* ── 라벨 행 ── */
.label-row{
  display:flex;align-items:center;height:var(--rh);
  padding:0 4px;gap:3px;border-bottom:1px solid var(--border2);
  background:#fff;transition:background .1s;
}
.label-row:hover{background:#f3f7fd;}
.label-row.step-hdr{background:#f8f4ef;height:calc(var(--rh) - 2px);}
.lr-num{width:26px;text-align:center;font-size:10px;color:#8899aa;font-weight:700;flex-shrink:0;}
.lr-step-badge{
  font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;
  white-space:nowrap;flex-shrink:0;width:70px;text-align:center;
  overflow:hidden;text-overflow:ellipsis;
}
.lr-name{
  flex:1;font-size:11px;color:var(--dgray);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:default;
}
.lr-name[title]:hover{color:var(--blue);}

/* 날짜 인풋 */
.lr-date{
  width:52px;font-size:10px;color:var(--dgray);
  border:1px solid transparent;border-radius:3px;
  padding:1px 2px;text-align:center;background:transparent;
  font-family:inherit;cursor:pointer;flex-shrink:0;
  transition:all .15s;
}
.lr-date:hover{border-color:var(--blue);background:#f0f6ff;}
.lr-date:focus{border-color:var(--blue);background:#fff;outline:none;
  box-shadow:0 0 0 2px rgba(46,117,182,0.2);}

/* 상태 셀렉트 */
.lr-sel{
  width:60px;height:20px;font-size:10px;font-weight:700;
  border-radius:4px;border:1px solid #ccd;cursor:pointer;
  font-family:inherit;padding:0 2px;flex-shrink:0;
}
.lr-sel.todo{background:#BDD7EE;color:#1F4E79;}
.lr-sel.inprogress{background:#FFEB9C;color:#7D6608;}
.lr-sel.done{background:#C6EFCE;color:#375623;}

/* 담당자 */
.lr-pic{
  width:80px;font-size:10px;color:var(--mgray);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;
}

/* ── 우측 스크롤 차트 영역 ── */
.chart-panel{flex:1;overflow-x:auto;overflow-y:hidden;position:relative;}
.chart-inner{position:relative;}

/* ── 날짜 헤더 ── */
.date-head{
  position:sticky;top:0;z-index:50;
  display:flex;flex-direction:column;
  background:var(--navy);
}
.month-row{display:flex;height:var(--hh1);}
.month-cell{
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#c8d0f0;
  border-right:1px solid #3a4565;border-bottom:1px solid #3a4565;
  white-space:nowrap;background:#252f50;flex-shrink:0;
}
.day-row{display:flex;height:var(--hh2);}
.day-cell{
  width:var(--dw);min-width:var(--dw);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:#9ab0cc;
  border-right:1px solid #2e3a55;
  background:var(--navy);
}
.day-cell.weekend{color:#ff9977;background:#1f1a2e;}
.day-cell.holiday{color:#ff6666;background:#2a1818;font-weight:800;}
.day-cell.today-d{
  color:#ffee00!important;background:#1a2d50!important;
  font-weight:900;font-size:12px;
  box-shadow:inset 0 0 0 1px rgba(255,238,0,.5);
}

/* ── 차트 본체 ── */
.chart-body{position:relative;}
.chart-row-wrap{display:flex;border-bottom:1px solid var(--border2);}
.chart-row-wrap.step-hdr{background:#f9f6f2;border-bottom:1px solid var(--border);}
.chart-row-wrap:hover:not(.step-hdr){background:#f4f8ff;}

.day-bg{
  width:var(--dw);min-width:var(--dw);flex-shrink:0;
  height:var(--rh);border-right:1px solid #edf0f7;
}
.day-bg.weekend{background:#fdf0ec;}
.day-bg.holiday{background:#ffe8e8;}
.day-bg.today-d{background:#eef4ff;}
.day-bg.month-end{border-right:2px solid #c8d2e2!important;}
.day-bg.step-hdr-bg{opacity:.5;}

/* 간트 바 래퍼 */
.bar-layer{
  position:absolute;top:0;left:0;
  pointer-events:none;
}
.bar-layer *{pointer-events:auto;}

/* 간트 바 */
.g-bar{
  position:absolute;height:16px;
  top:calc((var(--rh) - 16px)/2);
  border-radius:4px;cursor:grab;z-index:10;
  display:flex;align-items:center;padding:0 6px;
  font-size:9px;font-weight:700;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  box-shadow:0 1px 4px rgba(0,0,0,.18);
  transition:filter .1s,box-shadow .1s;user-select:none;
}
.g-bar:hover{filter:brightness(1.1);box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:20;}
.g-bar.dragging{cursor:grabbing;opacity:.85;z-index:50;filter:brightness(1.15);}
.g-bar .rh-l,.g-bar .rh-r{
  position:absolute;top:0;bottom:0;width:7px;cursor:ew-resize;z-index:15;
}
.g-bar .rh-l{left:0;border-radius:4px 0 0 4px;}
.g-bar .rh-r{right:0;border-radius:0 4px 4px 0;}

/* TODAY 선 */
.today-line{
  position:absolute;top:0;width:2px;
  background:var(--blue);pointer-events:none;z-index:35;opacity:.9;
}
.today-line::before{
  content:'TODAY';position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  background:var(--blue);color:#fff;
  font-size:9px;font-weight:800;padding:1px 6px;
  border-radius:0 0 4px 4px;white-space:nowrap;
  box-shadow:0 2px 4px rgba(0,0,0,.2);
}

/* 드래그 툴팁 */
.drag-tip{
  position:fixed;background:#1e2740;color:#fff;
  font-size:11px;font-weight:700;padding:4px 10px;
  border-radius:6px;pointer-events:none;display:none;
  z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.3);
}
/* 호버 툴팁 */
.g-tooltip{
  position:fixed;background:#1e2740;color:#e8ecf5;
  font-size:11px;padding:8px 12px;border-radius:8px;
  pointer-events:none;display:none;z-index:998;
  min-width:180px;max-width:260px;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.tt-title{font-weight:800;margin-bottom:5px;color:#fff;font-size:12px;}
.tt-r{display:flex;justify-content:space-between;gap:12px;margin-top:3px;font-size:10px;color:#9ab0cc;}
.tt-v{color:#e2e8f0;font-weight:600;text-align:right;}

/* 토스트 */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1e2740;color:#fff;padding:8px 20px;
  border-radius:20px;font-size:12px;font-weight:700;
  opacity:0;transition:opacity .3s;pointer-events:none;
  z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);
}
</style>
</head>
<body>

<!-- 툴바 -->
<div class="toolbar">
  <span class="tb-title">🔬 인시스그룹 AI혁신 R&D센터  설립 진행 간트차트</span>
  <span class="tb-ver">v2.0</span>
  <div class="tb-sep"></div>
  <button class="tb-btn accent" onclick="scrollToToday()">📅 오늘로</button>
  <button class="tb-btn" onclick="saveLocal()">💾 저장</button>
  <button class="tb-btn" onclick="loadLocal()">📂 불러오기</button>
  <button class="tb-btn" onclick="resetAll()">↺ 초기화</button>
  <div class="tb-sep"></div>
  <span class="tb-info" id="todayTxt"></span>
  <div class="tb-sep"></div>
  <span class="tb-prog" id="progTxt"></span>
</div>

<!-- 진행률 -->
<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <span class="prog-txt" id="progDetail"></span>
</div>

<!-- 범례 -->
<div class="legend">
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#e8921a,#f0ad30)"></div>STEP 0</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#2563eb,#4a86f5)"></div>STEP 1</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#1a9463,#28c07a)"></div>STEP 2</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#e05a14,#f07838)"></div>STEP 3</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#1d61c8,#4a86f5)"></div>STEP 4</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#2563eb,#4a86f5)"></div>STEP 5</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#e05a14,#f07838)"></div>STEP 6</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#1a9463,#28c07a)"></div>STEP 7</div>
  <div class="leg"><div class="leg-bar" style="background:linear-gradient(90deg,#c00000,#e05050)"></div>STEP 8</div>
  <div class="leg-sep"></div>
  <div class="leg"><div class="leg-bar" style="background:#ffe8e8;border:1px solid #ffbbbb;"></div>공휴일·투표일</div>
  <div class="leg"><div class="leg-bar" style="background:#fdf0ec;border:1px solid #f8cfc5;"></div>주말</div>
  <div class="leg"><div class="leg-bar" style="background:#eef4ff;border:1px solid #c8d8f8;"></div>오늘</div>
  <div class="leg-sep"></div>
  <span style="font-size:10px;color:#888;">💡 시작·완료 날짜 직접 입력 가능 | 막대 드래그로 이동 | 양 끝 드래그로 기간 조정</span>
</div>

<!-- 메인 -->
<div class="gantt-outer" id="ganttOuter">

  <!-- 좌측 고정 패널 -->
  <div class="label-panel" id="labelPanel">
    <div class="lp-head">
      <div class="lh-num">#</div>
      <div class="lh-step">단계</div>
      <div class="lh-name">추진 항목</div>
      <div class="lh-s">시작일</div>
      <div class="lh-e">완료일</div>
      <div class="lh-st">상태</div>
      <div class="lh-pic">담당</div>
    </div>
    <div id="labelBody"></div>
  </div>

  <!-- 우측 스크롤 차트 -->
  <div class="chart-panel" id="chartPanel">
    <div class="chart-inner" id="chartInner">
      <!-- 날짜 헤더 -->
      <div class="date-head" id="dateHead">
        <div class="month-row" id="monthRow"></div>
        <div class="day-row" id="dayRow"></div>
      </div>
      <!-- 차트 바디 -->
      <div class="chart-body" id="chartBody">
        <div class="bar-layer" id="barLayer"></div>
      </div>
    </div>
  </div>
</div>

<!-- TODAY 선 -->
<div class="today-line" id="todayLine" style="display:none;"></div>

<!-- 유틸 -->
<div class="drag-tip" id="dragTip"></div>
<div class="g-tooltip" id="gTooltip"></div>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ────────────────────────────────────────────
// 공휴일
// ────────────────────────────────────────────
const HOL = new Set([
  '2026-01-01','2026-02-16','2026-02-17','2026-02-18',
  '2026-03-01','2026-05-05','2026-05-25',
  '2026-06-03', // 대통령 선거일
  '2026-06-06','2026-08-15',
  '2026-09-24','2026-09-25','2026-09-26',
  '2026-10-03','2026-10-09','2026-12-25',
]);

function ds(y,m,d){ // date string
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function dd(y,m,d){ return new Date(y,m-1,d); } // date object
function toDS(dt){
  if(!dt) return '';
  return ds(dt.getFullYear(),dt.getMonth()+1,dt.getDate());
}
function fromDS(s){ // "YYYY-MM-DD" → Date
  if(!s) return null;
  const [y,m,d]=s.split('-').map(Number);
  return new Date(y,m-1,d);
}
function fmtKo(dt){
  if(!dt) return '';
  return dt.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
}
function isHol(dt){ return HOL.has(toDS(dt)); }
function isWk(dt){ const d=dt.getDay(); return d===0||d===6; }
function isOff(dt){ return isWk(dt)||isHol(dt); }
function dayDiff(a,b){ return Math.round((b-a)/86400000); }
function addDays(dt,n){ const r=new Date(dt); r.setDate(r.getDate()+n); return r; }

const TODAY = (()=>{ const t=new Date(); t.setHours(0,0,0,0); return t; })();

// ────────────────────────────────────────────
// STEP 정의
// ────────────────────────────────────────────
const STEPS = [
  {id:'s0',label:'STEP 0  품의·준비',   bar:'var(--s0b)',col:'var(--s0c)',bg:'var(--s0bg)'},
  {id:'s1',label:'STEP 1  소속 전환',   bar:'var(--s1b)',col:'var(--s1c)',bg:'var(--s1bg)'},
  {id:'s2',label:'STEP 2  공간 정비',   bar:'var(--s2b)',col:'var(--s2c)',bg:'var(--s2bg)'},
  {id:'s3',label:'STEP 3  서류 준비',   bar:'var(--s3b)',col:'var(--s3c)',bg:'var(--s3bg)'},
  {id:'s4',label:'STEP 4  KOITA 상담',  bar:'var(--s4b)',col:'var(--s4c)',bg:'var(--s4bg)'},
  {id:'s5',label:'STEP 5  온라인 신청', bar:'var(--s5b)',col:'var(--s5c)',bg:'var(--s5bg)'},
  {id:'s6',label:'STEP 6  심사·인정',   bar:'var(--s6b)',col:'var(--s6c)',bg:'var(--s6bg)'},
  {id:'s7',label:'STEP 7  인정 후',     bar:'var(--s7b)',col:'var(--s7c)',bg:'var(--s7bg)'},
  {id:'s8',label:'STEP 8  연구원 채용', bar:'var(--s8b)',col:'var(--s8c)',bg:'var(--s8bg)'},
];

// ────────────────────────────────────────────
// 태스크 초기 데이터 (엑셀 v15 그대로)
// ────────────────────────────────────────────
const INIT = [
  {id:'t00',st:'s0',name:'① 설립 검토서·품의서 결재 상신',     s:'2026-05-29',e:'2026-06-02',pic:'전략기획실·센터장',status:'inprogress',note:''},

// ────────────────────────────────────────────
// 상태 관리
// ────────────────────────────────────────────
let TASKS = INIT.map(t=>({...t}));

const CAL_S = new Date(2026,4,20); // 5/20
const CAL_E = new Date(2026,7,1);  // 8/1
const DW = 32; // px per day

let COLS = [];

function buildCols(){
  COLS=[];
  const cur=new Date(CAL_S);
  while(cur<=CAL_E){
    const hol=isHol(cur), wk=isWk(cur), td=cur.toDateString()===TODAY.toDateString();
    const me=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate()===cur.getDate();
    COLS.push({
      date:new Date(cur),day:cur.getDate(),
      month:cur.getMonth()+1,year:cur.getFullYear(),
      isHol:hol,isWk:wk,isOff:hol||wk,isToday:td,isMonthEnd:me
    });
    cur.setDate(cur.getDate()+1);
  }
}

function colOf(dt){
  if(!dt) return 0;
  const t=new Date(dt); t.setHours(0,0,0,0);
  const i=COLS.findIndex(c=>c.date.toDateString()===t.toDateString());
  return Math.max(0,i);
}

// ────────────────────────────────────────────
// 렌더링
// ────────────────────────────────────────────
function render(){
  buildCols();
  renderDateHead();
  renderRows();
  renderBars();
  setTodayLine();
  updateProgress();
  syncScroll();
}

/* 날짜 헤더 */
function renderDateHead(){
  const monthRow=document.getElementById('monthRow');
  const dayRow=document.getElementById('dayRow');
  monthRow.innerHTML='';
  dayRow.innerHTML='';

  // 월 그룹
  const months=[];let cur=null;
  COLS.forEach((c,i)=>{
    const k=`${c.year}-${c.month}`;
    if(!cur||cur.k!==k){cur={k,month:c.month,year:c.year,cnt:0};months.push(cur);}
    cur.cnt++;
  });
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  months.forEach(m=>{
    const div=document.createElement('div');
    div.className='month-cell';
    div.style.width=(m.cnt*DW)+'px';
    div.style.minWidth=(m.cnt*DW)+'px';
    div.textContent=`${m.year}년 ${MN[m.month-1]}`;
    monthRow.appendChild(div);
  });

  // 일
  COLS.forEach(c=>{
    const div=document.createElement('div');
    div.className='day-cell'+(c.isHol?' holiday':c.isWk?' weekend':'')+(c.isToday?' today-d':'');
    div.style.width=DW+'px';
    div.style.minWidth=DW+'px';
    div.textContent=c.day;
    dayRow.appendChild(div);
  });
}

/* 행 */
function renderRows(){
  const labelBody=document.getElementById('labelBody');
  const chartBody=document.getElementById('chartBody');
  const barLayer =document.getElementById('barLayer');
  labelBody.innerHTML='';
  // chart-body에서 barLayer 제외 나머지 삭제
  Array.from(chartBody.children).forEach(el=>{
    if(el.id!=='barLayer') chartBody.removeChild(el);
  });
  barLayer.innerHTML='';

  const totalW=COLS.length*DW;
  let rowNum=0; let rowTop=0;

  STEPS.forEach(step=>{
    const tasks=TASKS.filter(t=>t.st===step.id);
    if(!tasks.length) return;

    // ── STEP 헤더 ──
    // 라벨
    const lhRow=document.createElement('div');
    lhRow.className='label-row step-hdr';
    lhRow.innerHTML=`
      <div class="lr-num"></div>
      <div class="lr-step-badge" style="background:${step.col};color:#fff;width:140px;">
        ${step.label}
      </div>`;
    labelBody.appendChild(lhRow);

    // 차트 헤더 배경
    const chRow=document.createElement('div');
    chRow.className='chart-row-wrap step-hdr';
    chRow.style.cssText=`width:${totalW}px;height:var(--rh);display:flex;`;
    COLS.forEach(c=>{
      const cell=document.createElement('div');
      cell.className='day-bg step-hdr-bg'+(c.isHol?' holiday':c.isWk?' weekend':'')+(c.isToday?' today-d':'')+(c.isMonthEnd?' month-end':'');
      chRow.appendChild(cell);
    });
    chartBody.insertBefore(chRow, barLayer);
    rowTop += 28;

    // ── 태스크 행 ──
    tasks.forEach(task=>{
      rowNum++;
      const stMap={'todo':'todo','inprogress':'inprogress','done':'done',
                   '시작전':'todo','진행중':'inprogress','완료':'done'};
      const stKey=stMap[task.status]||'todo';

      // 라벨 행
      const lRow=document.createElement('div');
      lRow.className='label-row';
      lRow.dataset.tid=task.id;
      lRow.innerHTML=`
        <div class="lr-num">${rowNum}</div>
        <div class="lr-step-badge" style="background:${step.col};color:#fff;font-size:8px;">
          ${step.label.split(' ')[0]+' '+step.label.split(' ')[1]}
        </div>
        <div class="lr-name" title="${task.name}${task.note?'\n'+task.note:''}">${task.name}</div>
        <input type="date" class="lr-date" data-tid="${task.id}" data-side="s"
          value="${task.s}" title="시작일 — 클릭하여 변경">
        <input type="date" class="lr-date" data-tid="${task.id}" data-side="e"
          value="${task.e}" title="완료일 — 클릭하여 변경">
        <select class="lr-sel ${stKey}" data-tid="${task.id}">
          <option value="todo"       ${stKey==='todo'?'selected':''}>시작전</option>
          <option value="inprogress" ${stKey==='inprogress'?'selected':''}>진행중</option>
          <option value="done"       ${stKey==='done'?'selected':''}>완료</option>
        </select>
        <div class="lr-pic" title="${task.pic}">${task.pic}</div>`;
      labelBody.appendChild(lRow);

      // 차트 배경 행
      const cRow=document.createElement('div');
      cRow.className='chart-row-wrap';
      cRow.style.cssText=`width:${totalW}px;height:var(--rh);display:flex;`;
      cRow.dataset.tid=task.id;
      COLS.forEach(c=>{
        const cell=document.createElement('div');
        cell.className='day-bg'+(c.isHol?' holiday':c.isWk?' weekend':'')+(c.isToday?' today-d':'')+(c.isMonthEnd?' month-end':'');
        cRow.appendChild(cell);
      });
      chartBody.insertBefore(cRow, barLayer);
      rowTop+=28;
    });
  });
}

/* 바 렌더 */
function renderBars(){
  const barLayer=document.getElementById('barLayer');
  barLayer.innerHTML='';
  const totalW=COLS.length*DW;
  barLayer.style.width=totalW+'px';

  // 각 태스크의 rowTop 계산
  let rowTop=0;
  STEPS.forEach(step=>{
    const tasks=TASKS.filter(t=>t.st===step.id);
    if(!tasks.length) return;
    rowTop+=28; // step 헤더
    tasks.forEach(task=>{
      const step2=STEPS.find(s=>s.id===task.st);
      const sc=colOf(fromDS(task.s));
      const ec=colOf(fromDS(task.e));
      const barW=(ec-sc+1)*DW-3;
      if(barW>0){
        const bar=document.createElement('div');
        bar.className='g-bar';
        bar.dataset.tid=task.id;
        bar.style.cssText=`left:${sc*DW}px;width:${barW}px;top:${rowTop+6}px;background:${step2.bar};`;
        if(barW>50){
          const short=task.name.replace(/^[①-⑨]?\s*/,'');
          bar.textContent=short.length>18?short.substring(0,18)+'…':short;
        }
        const rl=document.createElement('div');rl.className='rh-l';rl.dataset.tid=task.id;rl.dataset.side='l';
        const rr=document.createElement('div');rr.className='rh-r';rr.dataset.tid=task.id;rr.dataset.side='r';
        bar.appendChild(rl);bar.appendChild(rr);
        barLayer.appendChild(bar);
      }
      rowTop+=28;
    });
  });
  barLayer.style.height=rowTop+'px';
}

/* TODAY 선 */
function setTodayLine(){
  const tl=document.getElementById('todayLine');
  const cp=document.getElementById('chartPanel');
  if(!tl||!cp) return;
  const idx=colOf(TODAY);
  const xOff=idx*DW+DW/2-1;
  const bodyH=document.getElementById('chartBody').offsetHeight+48;
  const hdrH=document.getElementById('dateHead').offsetHeight;
  tl.style.cssText=`
    display:block;
    position:absolute;
    left:${xOff}px;
    top:${hdrH}px;
    width:2px;
    height:${bodyH}px;
    background:var(--blue);
    opacity:.9;
    pointer-events:none;
    z-index:35;
  `;
}

/* 진행률 */
function updateProgress(){
  const total=TASKS.length;
  const stMap={'todo':'todo','inprogress':'inprogress','done':'done','시작전':'todo','진행중':'inprogress','완료':'done'};
  const done=TASKS.filter(t=>stMap[t.status]==='done').length;
  const prog=TASKS.filter(t=>stMap[t.status]==='inprogress').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progDetail').textContent=
    `완료 ${done}건 / 진행중 ${prog}건 / 시작전 ${total-done-prog}건 (전체 ${total}건)`;
  document.getElementById('progTxt').textContent=`완료 ${pct}%`;
  const now=new Date();
  document.getElementById('todayTxt').textContent=
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
}

// ────────────────────────────────────────────
// 이벤트: 날짜 인풋 변경 → 바 업데이트
// ────────────────────────────────────────────
document.getElementById('labelBody').addEventListener('change', function(e){
  const el=e.target;

  // 날짜 변경
  if(el.classList.contains('lr-date')){
    const tid=el.dataset.tid, side=el.dataset.side;
    const task=TASKS.find(t=>t.id===tid);
    if(!task) return;
    if(side==='s'){
      task.s=el.value;
      // 시작이 완료보다 늦으면 완료도 같이 이동
      if(task.s>task.e){
        task.e=task.s;
        // 완료 인풋도 업데이트
        const eInput=document.querySelector(`.lr-date[data-tid="${tid}"][data-side="e"]`);
        if(eInput) eInput.value=task.e;
      }
    } else {
      task.e=el.value;
      if(task.e<task.s){
        task.s=task.e;
        const sInput=document.querySelector(`.lr-date[data-tid="${tid}"][data-side="s"]`);
        if(sInput) sInput.value=task.s;
      }
    }
    updateBar(tid);
    saveLocal(true);
    showToast('📅 날짜 변경 저장');
    return;
  }

  // 상태 변경
  if(el.classList.contains('lr-sel')){
    const tid=el.dataset.tid;
    const task=TASKS.find(t=>t.id===tid);
    if(!task) return;
    task.status=el.value;
    el.className='lr-sel '+el.value;
    updateProgress();
    saveLocal(true);
    showToast('✅ 상태 변경 저장');
  }
});

/* 특정 태스크 바만 업데이트 */
function updateBar(tid){
  const task=TASKS.find(t=>t.id===tid);
  if(!task) return;
  const step=STEPS.find(s=>s.id===task.st);
  const sc=colOf(fromDS(task.s));
  const ec=colOf(fromDS(task.e));
  const barW=(ec-sc+1)*DW-3;

  let bar=document.querySelector(`.g-bar[data-tid="${tid}"]`);
  if(!bar){
    // 새로 생성
    bar=document.createElement('div');
    bar.className='g-bar';
    bar.dataset.tid=tid;
    const rl=document.createElement('div');rl.className='rh-l';rl.dataset.tid=tid;rl.dataset.side='l';
    const rr=document.createElement('div');rr.className='rh-r';rr.dataset.tid=tid;rr.dataset.side='r';
    bar.appendChild(rl);bar.appendChild(rr);
    document.getElementById('barLayer').appendChild(bar);
  }
  if(barW<=0){ bar.style.display='none'; return; }
  bar.style.display='';
  bar.style.left=sc*DW+'px';
  bar.style.width=barW+'px';
  bar.style.background=step.bar;

  // top 계산
  let top=0;
  for(const s of STEPS){
    const tasks=TASKS.filter(t=>t.st===s.id);
    if(!tasks.length) continue;
    top+=28;
    for(const t of tasks){
      if(t.id===tid){ bar.style.top=top+6+'px'; break; }
      top+=28;
    }
    if(bar.style.top) break;
  }

  // 텍스트
  const short=task.name.replace(/^[①-⑨]?\s*/,'');
  bar.childNodes[0] && bar.childNodes[0].nodeType===3 && bar.removeChild(bar.childNodes[0]);
  if(barW>50){
    bar.insertBefore(
      document.createTextNode(short.length>18?short.substring(0,18)+'…':short),
      bar.firstChild
    );
  }
}

// ────────────────────────────────────────────
// 드래그 & 리사이즈
// ────────────────────────────────────────────
(function(){
  const tip=document.getElementById('dragTip');
  const gtip=document.getElementById('gTooltip');

  document.getElementById('barLayer').addEventListener('mousedown',function(e){
    const bar=e.target.closest('.g-bar');
    const handle=e.target.closest('.rh-l,.rh-r');
    if(!bar&&!handle) return;
    e.preventDefault(); e.stopPropagation();
    gtip.style.display='none';

    const tid=(handle||bar).dataset.tid;
    const task=TASKS.find(t=>t.id===tid);
    if(!task) return;

    const origS=task.s, origE=task.e;
    const startX=e.clientX;
    const side=handle?handle.dataset.side:null;
    const mode=side?'resize-'+side:'move';

    bar.classList.add('dragging');
    document.body.style.cursor=mode==='move'?'grabbing':'ew-resize';
    document.body.style.userSelect='none';
    tip.style.display='block';

    function onMove(ev){
      const dx=ev.clientX-startX;
      const dd2=Math.round(dx/DW);
      if(!dd2) return;
      const elBar=document.querySelector(`.g-bar[data-tid="${tid}"]`);

      if(mode==='move'){
        const dur=dayDiff(fromDS(origS),fromDS(origE));
        const ns=toDS(addDays(fromDS(origS),dd2));
        const ne=toDS(addDays(fromDS(ns),dur));
        task.s=ns; task.e=ne;
        const sc=colOf(fromDS(ns));
        if(elBar){
          elBar.style.left=(sc*DW)+'px';
          elBar.style.width=((colOf(fromDS(ne))-sc+1)*DW-3)+'px';
        }
        tip.textContent=`${ns} ~ ${ne}`;
      } else if(mode==='resize-r'){
        const ne=toDS(addDays(fromDS(origE),dd2));
        if(ne>=task.s){
          task.e=ne;
          const sc=colOf(fromDS(task.s));
          const ec=colOf(fromDS(ne));
          if(elBar) elBar.style.width=((ec-sc+1)*DW-3)+'px';
        }
        tip.textContent=`완료: ${task.e}`;
      } else {
        const ns=toDS(addDays(fromDS(origS),dd2));
        if(ns<=task.e){
          task.s=ns;
          const sc=colOf(fromDS(ns));
          const ec=colOf(fromDS(task.e));
          if(elBar){
            elBar.style.left=(sc*DW)+'px';
            elBar.style.width=((ec-sc+1)*DW-3)+'px';
          }
        }
        tip.textContent=`시작: ${task.s}`;
      }
      tip.style.left=(ev.clientX+14)+'px';
      tip.style.top=(ev.clientY-34)+'px';
    }

    function onUp(){
      bar.classList.remove('dragging');
      document.body.style.cursor='';
      document.body.style.userSelect='';
      tip.style.display='none';

      // ★ 날짜 인풋도 동기화 ★
      const sInput=document.querySelector(`.lr-date[data-tid="${tid}"][data-side="s"]`);
      const eInput=document.querySelector(`.lr-date[data-tid="${tid}"][data-side="e"]`);
      if(sInput) sInput.value=task.s;
      if(eInput) eInput.value=task.e;

      // 바 텍스트 갱신
      const elBar=document.querySelector(`.g-bar[data-tid="${tid}"]`);
      if(elBar){
        const short=task.name.replace(/^[①-⑨]?\s*/,'');
        const w=parseInt(elBar.style.width)||0;
        // 텍스트 노드 제거
        Array.from(elBar.childNodes).filter(n=>n.nodeType===3).forEach(n=>elBar.removeChild(n));
        if(w>50) elBar.insertBefore(
          document.createTextNode(short.length>18?short.substring(0,18)+'…':short),
          elBar.firstChild
        );
      }

      updateProgress();
      saveLocal(true);
      showToast('📅 날짜 변경 저장');
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });

  // 툴팁
  document.getElementById('barLayer').addEventListener('mouseover',function(e){
    const bar=e.target.closest('.g-bar');
    if(!bar) return;
    const task=TASKS.find(t=>t.id===bar.dataset.tid);
    if(!task) return;
    gtip.innerHTML=`
      <div class="tt-title">${task.name}</div>
      <div class="tt-r"><span>시작</span><span class="tt-v">${task.s}</span></div>
      <div class="tt-r"><span>완료</span><span class="tt-v">${task.e}</span></div>
      <div class="tt-r"><span>담당</span><span class="tt-v">${task.pic}</span></div>
      ${task.note?`<div class="tt-r"><span>비고</span><span class="tt-v" style="max-width:150px;white-space:normal;text-align:right;">${task.note}</span></div>`:''}
    `;
    gtip.style.display='block';
  });
  document.getElementById('barLayer').addEventListener('mousemove',function(e){
    if(gtip.style.display==='block'){
      gtip.style.left=(e.clientX+14)+'px';
      gtip.style.top=(e.clientY-8)+'px';
    }
  });
  document.getElementById('barLayer').addEventListener('mouseleave',()=>{gtip.style.display='none';});
})();

// ────────────────────────────────────────────
// 오늘로 스크롤
// ────────────────────────────────────────────
function scrollToToday(){
  const cp=document.getElementById('chartPanel');
  const idx=colOf(TODAY);
  const xPos=idx*DW - cp.offsetWidth/2 + DW/2;
  cp.scrollLeft=Math.max(0,xPos);
}

// ────────────────────────────────────────────
// 저장·불러오기·초기화
// ────────────────────────────────────────────
function saveLocal(silent=false){
  localStorage.setItem('rnd_g2',JSON.stringify(TASKS.map(t=>({
    id:t.id,s:t.s,e:t.e,status:t.status
  }))));
  if(!silent) showToast('💾 저장 완료');
}

function loadLocal(){
  try{
    const raw=localStorage.getItem('rnd_g2');
    if(!raw){ showToast('저장된 데이터 없음'); return; }
    JSON.parse(raw).forEach(item=>{
      const t=TASKS.find(x=>x.id===item.id);
      if(t){ t.s=item.s; t.e=item.e; t.status=item.status; }
    });
    render();
    showToast('📂 불러오기 완료');
  }catch(ex){ showToast('불러오기 실패: '+ex.message); }
}

function resetAll(){
  if(!confirm('모든 변경사항을 초기화하겠습니까?')) return;
  TASKS=INIT.map(t=>({...t}));
  localStorage.removeItem('rnd_g2');
  render();
  showToast('↺ 초기화 완료');
}

function showToast(msg,dur=1800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>{t.style.opacity='0';},dur);
}

window.addEventListener('scroll',function(){

});

// ────────────────────────────────────────────
// 초기 실행
// ────────────────────────────────────────────
window.addEventListener('load', function(){
  // localStorage 복원
  try{
    const raw=localStorage.getItem('rnd_g2');
    if(raw){
      JSON.parse(raw).forEach(item=>{
        const t=TASKS.find(x=>x.id===item.id);
        if(t){ t.s=item.s; t.e=item.e; t.status=item.status; }
      });
    }
  }catch(ex){}

  render();

  // 오늘로 스크롤
  setTimeout(()=>{
    scrollToToday();
    setTodayLine();
  }, 150);

  // 리사이즈 대응
  window.addEventListener('resize', ()=>{ setTodayLine(); });
});
